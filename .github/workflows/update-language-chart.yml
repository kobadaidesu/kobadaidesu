name: Update Language Chart

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-language-chart.yml
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: language-chart-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-language-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Generate language metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: kobadaidesu
          filename: assets/language-stats.svg
          committer_branch: main
          committer_message: Update language stats
          base: ""
          repositories_forks: yes
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_other: yes
          plugin_languages_details: percentage
          plugin_languages_colors: github
          config_timezone: Asia/Tokyo
